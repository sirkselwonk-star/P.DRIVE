<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SLIME RACER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  color: #fff;
}

#wrapper { position: relative; overflow: hidden; }

canvas { display: block; }

#dashCanvas {
  border: 2px solid #39FF14;
  border-top: 1px solid #0a3a00;
  background: #080808;
  box-shadow: 0 0 48px #39FF1466, 0 0 100px #39FF1422;
}

#gameCanvas {
  border: 2px solid #39FF14;
  border-bottom: none;
  box-shadow: 0 0 48px #39FF1466, 0 0 100px #39FF1422;
}

/* ── Overlay ── */
#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  gap: 14px;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 3px,
    rgba(57,255,20,0.018) 3px,
    rgba(57,255,20,0.018) 4px
  );
}



#overlay .eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 6px;
  color: #555;
  text-transform: uppercase;
}

#overlay h1 {
  font-size: clamp(26px, 10vw, 52px);
  font-weight: 900;
  color: #39FF14;
  letter-spacing: clamp(3px, 1.5vw, 8px);
  line-height: 1;
  white-space: nowrap;
  animation: titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { text-shadow: 0 0 20px #39FF14aa, 0 0 60px #39FF1444; }
  50%       { text-shadow: 0 0 35px #39FF14cc, 0 0 90px #39FF1477, 0 0 130px #39FF1422; }
}

#overlay .drive-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 2.5vw, 13px);
  letter-spacing: clamp(4px, 1.5vw, 10px);
  color: rgba(57,255,20,0.5);
  text-align: center;
  white-space: pre-line;
  line-height: 1.7;
}

#overlay .divider {
  width: 140px;
  height: 1px;
  background: linear-gradient(to right, transparent, #39FF14, transparent);
  margin: 2px 0;
}

#overlay .msg {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 3px;
  color: #888;
}

#overlay button {
  margin-top: 12px;
  background: transparent;
  color: #39FF14;
  border: 1.5px solid #39FF14;
  padding: 13px 48px;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 5px;
  cursor: pointer;
  transition: color 0.18s, box-shadow 0.18s;
  position: relative;
  overflow: hidden;
  z-index: 0;
}

#overlay button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #39FF14;
  transform: translateX(-101%);
  transition: transform 0.18s ease;
  z-index: -1;
}

#overlay button:hover { color: #000; box-shadow: 0 0 28px #39FF1488; }
#overlay button:hover::before { transform: translateX(0); }

/* ── Controls hint ── */
#controls-hint {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(57,255,20,0.22);
  pointer-events: none;
  z-index: 10;
  white-space: nowrap;
  border: 1px solid rgba(57,255,20,0.1);
  padding: 4px 14px;
}

/* ── Mobile Controls ── */
#mobile-controls {
  display: none;
  position: absolute;
  bottom: 18px; left: 0;
  width: 100%; height: 110px;
  z-index: 15;
  pointer-events: none;
}

#steer-zone {
  position: absolute;
  left: 0; bottom: 0;
  width: 50%; height: 120px;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
}

#joystick-base {
  width: 96px; height: 96px;
  background: rgba(0,0,0,0.65);
  border: 1.5px solid rgba(57,255,20,0.35);
  border-radius: 50%;
  position: relative;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  box-shadow: 0 0 20px rgba(57,255,20,0.08), inset 0 0 20px rgba(0,0,0,0.5);
}

#joystick-knob {
  width: 40px; height: 40px;
  background: radial-gradient(circle at 38% 32%, #88ff66, #1a8a0b 70%, #0a5800);
  border-radius: 50%;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 3px 10px rgba(0,0,0,0.7), 0 0 14px rgba(57,255,20,0.3);
  pointer-events: none;
}

#joystick-base::before {
  content: '◀  ▶';
  position: absolute;
  width: 100%; text-align: center;
  top: 50%; transform: translateY(-50%);
  font-size: 8px;
  color: rgba(57,255,20,0.18);
  letter-spacing: 26px;
  pointer-events: none;
  padding-left: 4px;
}

#gas-zone {
  position: absolute;
  right: 0; bottom: 0;
  width: 50%; height: 110px;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 10px 16px;
}

.gas-btn {
  width: 62px; height: 62px;
  background: rgba(0,0,0,0.75);
  border: 1.5px solid #39FF14;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  color: #39FF14;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  pointer-events: all;
  transition: background 0.1s, box-shadow 0.1s;
}
#btn-gas   { width:70px; height:70px; border-color:#00ff88; color:#00ff88; }
#btn-brake { border-color:#ff4455; color:#ff4455; }
#btn-gas:active,   #btn-gas.pressed   { background:rgba(0,255,136,0.18); box-shadow:0 0 16px rgba(0,255,136,0.4); }
#btn-brake:active, #btn-brake.pressed { background:rgba(255,68,85,0.18);  box-shadow:0 0 16px rgba(255,68,85,0.4); }

@media (pointer: coarse) {
  #mobile-controls { display: block; }
  #controls-hint   { display: none; }
}

@media (orientation: landscape) and (pointer: coarse) {
  #mobile-controls { bottom: 0; height: 100%; }
  #steer-zone { justify-content: flex-start; padding-left: 6%; top: 42%; bottom: auto; }
  #gas-zone   { justify-content: flex-end; padding-right: 6%; top: 42%; bottom: auto; }
}
</style>
</head>
<body>

<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
  <canvas id="dashCanvas"></canvas>

  <div id="overlay">
    <div class="eyebrow">WELCOME TO</div>
    <h1>SLIME RACER</h1>
    <div class="drive-label">S T A R T &nbsp; Y O U R&#10;E N G I N E</div>
    <div class="divider"></div>
    <div class="msg" id="overlayMsg">RACE TO THE FINISH — HIT CHECKPOINTS FOR MORE TIME</div>
    <button id="startBtn">START ENGINE</button>
  </div>

  <div id="controls-hint">← → STEER &nbsp;·&nbsp; ↑ ACCELERATE &nbsp;·&nbsp; ↓ BRAKE &nbsp;·&nbsp; STAY ON THE ROAD</div>

  <div id="mobile-controls">
    <div id="steer-zone">
      <div id="joystick-base"><div id="joystick-knob"></div></div>
    </div>
    <div id="gas-zone">
      <div class="gas-btn" id="btn-brake">BRAKE</div>
      <div class="gas-btn" id="btn-gas">GAS</div>
    </div>
  </div>
</div>

<script>
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const dashCanvas = document.getElementById('dashCanvas');
const dctx       = dashCanvas.getContext('2d');

// ── Sizing ────────────────────────────────────────────────────
const DASH_H = 48;
const W  = window.innerWidth;
const isTouchOrSmall   = window.matchMedia('(pointer: coarse)').matches || W <= 820;
const isLandscapeTouch = isTouchOrSmall && window.innerWidth > window.innerHeight;
const H  = isLandscapeTouch ? window.innerHeight : window.innerHeight - DASH_H;
const DW = isLandscapeTouch ? Math.floor(W * 0.5) : W;
const DH = DASH_H;

canvas.width      = W;  canvas.height      = H;
dashCanvas.width  = DW; dashCanvas.height  = DH;

const wrapper = document.getElementById('wrapper');
wrapper.style.width  = W + 'px';
wrapper.style.height = (isLandscapeTouch ? H : H + DH) + 'px';

if (isLandscapeTouch) {
  dashCanvas.style.position     = 'absolute';
  dashCanvas.style.bottom       = '8px';
  dashCanvas.style.left         = '50%';
  dashCanvas.style.transform    = 'translateX(-50%)';
  dashCanvas.style.zIndex       = '14';
  dashCanvas.style.pointerEvents = 'none';
}

document.getElementById('mobile-controls').style.display = isTouchOrSmall ? 'block' : 'none';
document.getElementById('controls-hint').style.display   = isTouchOrSmall ? 'none'  : 'block';

// Reload on orientation change so canvas resizes cleanly
window.addEventListener('orientationchange', () => setTimeout(() => location.reload(), 150));

// ── Game State ────────────────────────────────────────────────
let state = 'menu', level = 1, coins = 0;
let distanceTravelled = 0;
const levelDistance = 50000;

// ── Timer / Checkpoint System ────────────────────────────────
const START_TIME       = 45;    // seconds at race start
const CHECKPOINT_BONUS = 25;    // seconds added per checkpoint
const NUM_CHECKPOINTS  = 4;     // checkpoints per level (evenly spaced)
let raceTimer          = START_TIME;
let checkpointsPassed  = 0;
let nextCheckpointDist = 0;     // distance of next checkpoint
let checkpointFlashT   = 0;     // countdown for checkpoint flash overlay

// ── Car Skins (20 combos: body, roof top, roof bottom, stripe, wheel hub) ──
const CAR_SKINS = [
  { body:'#0a1a0a', roofA:'#39FF14', roofB:'#1a8a0a', stripe:'#39FF14', hub:'#363',  name:'SLIME STANDARD'  },
  { body:'#0a0a2a', roofA:'#4488ff', roofB:'#1133bb', stripe:'#88ccff', hub:'#336',  name:'MIDNIGHT BLUE'   },
  { body:'#1a0000', roofA:'#ff3311', roofB:'#aa1100', stripe:'#ff6644', hub:'#633',  name:'CRIMSON DEVIL'   },
  { body:'#001a00', roofA:'#00ff88', roofB:'#008844', stripe:'#66ffbb', hub:'#363',  name:'TOXIC GREEN'     },
  { body:'#1a001a', roofA:'#cc44ff', roofB:'#880099', stripe:'#ee88ff', hub:'#636',  name:'ULTRAVIOLET'     },
  { body:'#f0f0f0', roofA:'#ffffff', roofB:'#cccccc', stripe:'#39FF14', hub:'#aaa',  name:'ARCTIC WHITE'    },
  { body:'#0d0d0d', roofA:'#ff9900', roofB:'#cc6600', stripe:'#ffcc44', hub:'#753',  name:'INFERNO ORANGE'  },
  { body:'#001030', roofA:'#00eeff', roofB:'#0099bb', stripe:'#88ffff', hub:'#059',  name:'NEON CYAN'       },
  { body:'#2a1a00', roofA:'#ffdd88', roofB:'#cc9900', stripe:'#ffe4aa', hub:'#864',  name:'SAND STORM'      },
  { body:'#0a0a0a', roofA:'#ff0055', roofB:'#aa0033', stripe:'#ff4488', hub:'#533',  name:'HOT PINK'        },
  { body:'#101020', roofA:'#aaaaff', roofB:'#6666cc', stripe:'#ccccff', hub:'#446',  name:'GALAXY SILVER'   },
  { body:'#0a1400', roofA:'#66ff22', roofB:'#33bb00', stripe:'#88ff44', hub:'#363',  name:'ACID LIME'       },
  { body:'#200010', roofA:'#ff6600', roofB:'#cc3300', stripe:'#ffaa44', hub:'#743',  name:'LAVA FLOW'       },
  { body:'#000818', roofA:'#00ffcc', roofB:'#00aaaa', stripe:'#88ffee', hub:'#057',  name:'DEEP TEAL'       },
  { body:'#18000a', roofA:'#ff44cc', roofB:'#cc0099', stripe:'#ff99ee', hub:'#636',  name:'CANDY MAGENTA'   },
  { body:'#0f0f00', roofA:'#ffff00', roofB:'#aaaa00', stripe:'#ffff88', hub:'#663',  name:'NUCLEAR YELLOW'  },
  { body:'#100005', roofA:'#ff2200', roofB:'#990000', stripe:'#ff8866', hub:'#533',  name:'MOLTEN CORE'     },
  { body:'#001010', roofA:'#33ff99', roofB:'#009966', stripe:'#99ffcc', hub:'#065',  name:'EMERALD RUSH'    },
  { body:'#15051a', roofA:'#9933ff', roofB:'#6600cc', stripe:'#cc88ff', hub:'#537',  name:'ROYAL PURPLE'    },
  { body:'#1a1a1a', roofA:'#e8e8e8', roofB:'#aaaaaa', stripe:'#ffffff', hub:'#888',  name:'STEALTH CHROME'  },
];
let carSkin = 0;
const COINS_PER_UPGRADE = 20;

// ── Road Constants ────────────────────────────────────────────
const ROAD_HALF  = 1.9;
const DRAW_DIST  = 200;
// Per screen-class perspective tuning:
//   isLandscapeTouch – phone sideways, short canvas, touch controls
//   W > H (desktop)  – large screen, tall canvas, pointer device
//   portrait          – phone upright
const HORIZON     = isLandscapeTouch ? 0.42
                  : W > H            ? 0.45
                  :                    0.58;
// roadViewW caps how wide the road appears at depth=1.
// Smaller multiplier on desktop avoids the road being overwhelmingly
// wide on a tall canvas; larger on landscape-touch compensates for
// the compressed ground height.
const ROAD_VIEW_W = Math.min(W, H * (isLandscapeTouch ? 1.4
                                   : W > H            ? 0.9
                                   :                    1.2));
const SCROLL_DIV = 22;

const LEVEL_SPEEDS = [420, 600, 800, 1050, 1350, 1600, 1900, 2250, 2650, 3100];

// ── Player ────────────────────────────────────────────────────
let player = { x:0, speed:0, falling:false, fallY:0, fallVY:0 };

// ── Road ──────────────────────────────────────────────────────
let segments = [], roadOffset = 0;
let dashTextX = -1;

const BILLBOARD_DATA = [
  { line1:'SLIME RACER',   line2:'ARCADE GP'     },
  { line1:'FULL THROTTLE', line2:'NO BRAKES'     },
  { line1:'PIT STOP',      line2:'NEXT EXIT →'   },
  { line1:'TURBO BOOST',   line2:'ENGAGE NOW'    },
  { line1:'FASTEST LAP',   line2:'CAN YOU BEAT?' },
  { line1:'CHECKPOINT',    line2:'AHEAD!'        },
  { line1:'SLIME TIME',    line2:'LETS GOOO'     },
  { line1:'DANGER ZONE',   line2:'STAY ON TRACK' },
  { line1:'RACE HARDER',   line2:'DRIVE FASTER'  },
  { line1:'FINISH LINE',   line2:'NOT FAR NOW'   },
];
const SIGN_DATA = [
  { type:'warn', line1:'SHARP', line2:'TURN'   },
  { type:'info', line1:'PIT',   line2:'LANE'   },
  { type:'warn', line1:'SLOW',  line2:'DOWN'   },
  { type:'info', line1:'CHKPT', line2:'AHEAD'  },
  { type:'warn', line1:'CAUTION', line2:'!'    },
  { type:'info', line1:'PUSH',  line2:'IT!'    },
];

function buildRoad() {
  segments = [];
  const total = Math.ceil(levelDistance / SCROLL_DIV) + DRAW_DIST;
  let bbIdx = 0, signIdx = 0;
  let treeIdx = 0, tiresIdx = 0, buildIdx = 0;
  // Pre-compute checkpoint segment indices
  const checkpointSegs = [];
  for (let k = 0; k < NUM_CHECKPOINTS; k++) {
    const dist = levelDistance * (k + 1) / (NUM_CHECKPOINTS + 1);
    checkpointSegs.push(Math.round(dist / SCROLL_DIV));
  }
  for (let i = 0; i < total; i++) {
    const phase = Math.floor(i / 35) % 4;
    const curve = [
       Math.sin(i * 0.07) *  0.010,
      -Math.sin(i * 0.05) *  0.012,
       Math.sin(i * 0.09) *  0.008,
      -Math.sin(i * 0.06) *  0.014,
    ][phase];
    // Hill elevation — long sweeping sine waves for smooth terrain
    const hillPhase = Math.floor(i / 60) % 4;
    const hill = [
       Math.sin(i * 0.025) *  0.024,
      -Math.sin(i * 0.030) *  0.028,
       Math.sin(i * 0.020) *  0.032,
      -Math.sin(i * 0.028) *  0.022,
    ][hillPhase];
    let billboard = null, sign = null, tree = null, tires = null, building = null, cliff = null;
    if (i > 40 && i % 180 === 0) {
      billboard = { ...BILLBOARD_DATA[bbIdx % BILLBOARD_DATA.length], side: bbIdx % 2 === 0 ? 'R' : 'L' };
      bbIdx++;
    } else if (i > 40 && i % 70 === 0) {
      sign = { ...SIGN_DATA[signIdx % SIGN_DATA.length], side: signIdx % 2 === 0 ? 'L' : 'R' };
      signIdx++;
    } else if (i > 10) {
      // Cycle: trees / tires / trees / buildings / mountains
      const section = Math.floor(i / 120) % 5;
      if (section === 4) {
        // Mountain cliffs on EVERY segment for continuous wall
        cliff = { seed: i * 17 + 31 };
      } else if (i % 2 === 0) {
        if (section === 1 && i % 8 === 0) {
          tires = { side: tiresIdx % 2 === 0 ? 'R' : 'L', count: 2 + (tiresIdx % 3) };
          tiresIdx++;
        } else if (section === 3) {
          building = { side: buildIdx % 5 === 0 ? (buildIdx % 2 === 0 ? 'R' : 'L') : 'B', variant: buildIdx % 5 };
          buildIdx++;
        } else if (section === 0 || section === 2) {
          tree = { side: treeIdx % 5 === 0 ? (treeIdx % 2 === 0 ? 'R' : 'L') : 'B', variant: treeIdx % 4 };
          treeIdx++;
        }
      }
    }
    const checkpoint = checkpointSegs.includes(i);
    segments.push({ curve, hill, coin: i > 20 && i % 17 === 0, billboard, sign, tree, tires, building, cliff, checkpoint });
  }
}

// ── Art Palettes ──────────────────────────────────────────────
const artStyles = [
  { name:'GRAND PRIX',     sky:['#2288ee','#55aaff','#88ccff'], road:'#555555', verge:['#228833','#33aa44'], stripe:'#ffffff',  fog:'#aaccee', stars:false },
  { name:'SUMMER CIRCUIT', sky:['#0077dd','#3399ee','#66bbff'], road:'#4a4a4a', verge:['#1a7733','#2d9944'], stripe:'#ffff00',  fog:'#99bbdd', stars:false },
  { name:'COASTAL RUN',    sky:['#33aaee','#66ccff','#aaddff'], road:'#505050', verge:['#228844','#44aa55'], stripe:'#ffffff',  fog:'#bbddee', stars:false },
  { name:'MOUNTAIN PASS',  sky:['#4488cc','#6699dd','#88bbee'], road:'#484848', verge:['#1a6633','#2d8844'], stripe:'#ffcc00',  fog:'#8899aa', stars:false },
  { name:'SUNSET STRIP',   sky:['#cc4400','#ff8833','#ffcc66'], road:'#4a4a4a', verge:['#336622','#448833'], stripe:'#ffffff',  fog:'#ffaa55', stars:false },
  { name:'NIGHT RACE',     sky:['#000022','#001144','#002266'], road:'#2a2a2a', verge:['#0a2210','#112a18'], stripe:'#39FF14',  fog:'#001133', stars:true  },
  { name:'TROPICAL GP',    sky:['#00bbdd','#44ddee','#88eeff'], road:'#585858', verge:['#22aa44','#44cc55'], stripe:'#ffffff',  fog:'#aaeeff', stars:false },
  { name:'AUTUMN CLASSIC', sky:['#cc8833','#ddaa55','#eeccaa'], road:'#4c4c4c', verge:['#886622','#aa8833'], stripe:'#ffffff',  fog:'#ccaa77', stars:false },
  { name:'THUNDER ROAD',   sky:['#445566','#667788','#889999'], road:'#404040', verge:['#334422','#445533'], stripe:'#ffff00',  fog:'#556677', stars:false },
  { name:'FINAL LAP',      sky:['#1166bb','#3388dd','#55aaff'], road:'#525252', verge:['#1a7733','#33aa44'], stripe:'#39FF14',  fog:'#88aacc', stars:false },
];
function getStyle() { return artStyles[(level-1) % artStyles.length]; }

// ── Input ─────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Joystick ──────────────────────────────────────────────────
const joystickBase = document.getElementById('joystick-base');
const joystickKnob = document.getElementById('joystick-knob');
const JOY_R = 48, JOY_DEAD = 0.14;
let joystickActive = false, joystickTouchId = null;
let joystickOrigin = {x:0,y:0}, joystickDelta = 0;

function joyStart(e) {
  e.preventDefault();
  const rect = joystickBase.getBoundingClientRect();
  let t = null;
  if (e.changedTouches) {
    for (const ct of e.changedTouches)
      if (ct.clientX >= rect.left && ct.clientX <= rect.right &&
          ct.clientY >= rect.top  && ct.clientY <= rect.bottom) { t = ct; break; }
  } else t = e;
  if (!t) return;
  joystickActive  = true;
  joystickTouchId = t.identifier ?? 'mouse';
  joystickOrigin  = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  joyApply(t.clientX);
}
function joyMove(e) {
  if (!joystickActive) return;
  e.preventDefault();
  let t = null;
  if (e.touches) { for (const ct of e.touches) if (ct.identifier === joystickTouchId) { t = ct; break; } }
  else t = e;
  if (t) joyApply(t.clientX);
}
function joyApply(clientX) {
  const dx = Math.max(-JOY_R, Math.min(JOY_R, clientX - joystickOrigin.x));
  joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), -50%)`;
  joystickDelta = dx / JOY_R;
}
function joyEnd(e) {
  e.preventDefault();
  if (e.changedTouches) {
    let found = false;
    for (const ct of e.changedTouches) if (ct.identifier === joystickTouchId) { found = true; break; }
    if (!found) return;
  }
  joystickActive = false; joystickTouchId = null; joystickDelta = 0;
  joystickKnob.style.transform = 'translate(-50%, -50%)';
}

joystickBase.addEventListener('touchstart',  joyStart, {passive:false});
joystickBase.addEventListener('touchmove',   joyMove,  {passive:false});
joystickBase.addEventListener('touchend',    joyEnd,   {passive:false});
joystickBase.addEventListener('touchcancel', joyEnd,   {passive:false});
joystickBase.addEventListener('mousedown',   joyStart);
window.addEventListener('mousemove', e => joystickActive && joyMove(e));
window.addEventListener('mouseup',   e => joystickActive && joyEnd(e));

function bindBtn(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = e => { e.preventDefault(); keys[code] = true;  el.classList.add('pressed'); };
  const off = e => { e.preventDefault(); keys[code] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  on,  {passive:false});
  el.addEventListener('touchend',    off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
bindBtn('btn-gas',   'ArrowUp');
bindBtn('btn-brake', 'ArrowDown');

canvas.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove',  e => e.preventDefault(), {passive:false});

// ── Particles ─────────────────────────────────────────────────
let particles = [];
let explodeParticles = [];

function spawnParticles() {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x:  W/2 + (Math.random()-0.5)*80,
      y:  H * 0.72,
      vx: (Math.random()-0.5)*240,
      vy: -Math.random()*280 - 40,
      life: 0.7,
    });
  }
}

function spawnExplosion() {
  const cx = W / 2, cy = H * 0.72;
  // Debris chunks
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 180 + Math.random() * 420;
    explodeParticles.push({
      type: 'chunk',
      x: cx + (Math.random()-0.5)*30,
      y: cy + (Math.random()-0.5)*20,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 200,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random()-0.5) * 18,
      w: 4 + Math.random() * 12,
      h: 3 + Math.random() * 8,
      color: ['#39FF14','#FF4400','#FF8800','#FF2200','#FFAA00'][Math.floor(Math.random()*5)],
      life: 1.0,
      gravity: 600 + Math.random() * 200,
    });
  }
  // Spark streaks
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 300 + Math.random() * 300;
    explodeParticles.push({
      type: 'spark',
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 100,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.5 + Math.random() * 0.3,
      gravity: 400,
    });
  }
  // Shockwave ring (single entry, drawn differently)
  explodeParticles.push({ type:'ring', x:cx, y:cy, r:0, life:0.5, maxLife:0.5 });
}

function updateExplosion(dt) {
  explodeParticles = explodeParticles.filter(p => p.life > 0);
  explodeParticles.forEach(p => {
    p.life -= dt;
    if (p.type === 'chunk') {
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vy += p.gravity * dt;
      p.rot += p.rotV * dt;
    } else if (p.type === 'spark') {
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vy += p.gravity * dt;
    } else if (p.type === 'ring') {
      p.r  += 320 * dt;
    }
  });
}

function drawExplosion() {
  if (explodeParticles.length === 0) return;
  explodeParticles.forEach(p => {
    const a = Math.max(0, p.life / (p.maxLife || p.life + 0.001));
    ctx.save();
    ctx.globalAlpha = a;
    if (p.type === 'chunk') {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 10;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    } else if (p.type === 'spark') {
      ctx.strokeStyle = '#FFCC00';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#FF8800'; ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03);
      ctx.stroke();
    } else if (p.type === 'ring') {
      ctx.strokeStyle = '#FF6600';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  });
}

// ── Audio ─────────────────────────────────────────────────────
let audioCtx   = null;
let audioReady = false;
let engineGain = null, engineFilter = null;
let engineOsc1 = null, engineOsc2   = null;

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0;
  engineFilter = audioCtx.createBiquadFilter();
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 600;
  engineFilter.Q.value = 1.2;
  engineOsc1 = audioCtx.createOscillator();
  engineOsc1.type = 'sawtooth'; engineOsc1.frequency.value = 55;
  engineOsc2 = audioCtx.createOscillator();
  engineOsc2.type = 'sawtooth'; engineOsc2.frequency.value = 58;
  const g1 = audioCtx.createGain(); g1.gain.value = 0.55;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.45;
  engineOsc1.connect(g1); g1.connect(engineFilter);
  engineOsc2.connect(g2); g2.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineOsc1.start(); engineOsc2.start();
}

function updateEngineAudio(speed, maxSpeed) {
  if (!audioReady || !engineGain) return;
  if (player.falling) return; // engine already killed, don't touch it
  const now = audioCtx.currentTime;
  const t   = speed / maxSpeed;
  const f1  = 55 + t * 165;
  engineOsc1.frequency.setTargetAtTime(f1,          now, 0.08);
  engineOsc2.frequency.setTargetAtTime(f1 * 1.055,  now, 0.08);
  engineFilter.frequency.setTargetAtTime(400 + t * 2200, now, 0.1);
  engineGain.gain.setTargetAtTime(state === 'playing' ? (0.04 + t * 0.14) : 0, now, 0.12);
}

function playCoinSound() {
  if (!audioReady) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(1200, now);
  o.frequency.exponentialRampToValueAtTime(900, now + 0.12);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.28, now + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now + 0.2);
}

function playExplosionSound() {
  if (!audioReady) return;
  const now = audioCtx.currentTime;

  // Low boom — pitch-dropping oscillator
  const boom = audioCtx.createOscillator();
  const boomG = audioCtx.createGain();
  boom.type = 'sawtooth';
  boom.frequency.setValueAtTime(120, now);
  boom.frequency.exponentialRampToValueAtTime(25, now + 0.4);
  boomG.gain.setValueAtTime(0.6, now);
  boomG.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
  boom.connect(boomG); boomG.connect(audioCtx.destination);
  boom.start(now); boom.stop(now + 0.5);

  // Noise burst crunch
  const bufLen = audioCtx.sampleRate * 0.6;
  const buf  = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufLen, 1.5);
  const crunch = audioCtx.createBufferSource();
  const crunchF = audioCtx.createBiquadFilter();
  const crunchG = audioCtx.createGain();
  crunch.buffer = buf;
  crunchF.type = 'lowpass'; crunchF.frequency.value = 800;
  crunchG.gain.setValueAtTime(0.7, now);
  crunchG.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
  crunch.connect(crunchF); crunchF.connect(crunchG); crunchG.connect(audioCtx.destination);
  crunch.start(now); crunch.stop(now + 0.65);

  // Falling whistle — descending sine
  setTimeout(() => {
    if (!audioReady) return;
    const t = audioCtx.currentTime;
    const w = audioCtx.createOscillator();
    const wG = audioCtx.createGain();
    w.type = 'sine';
    w.frequency.setValueAtTime(800, t);
    w.frequency.exponentialRampToValueAtTime(80, t + 1.8);
    wG.gain.setValueAtTime(0.15, t);
    wG.gain.setValueAtTime(0.15, t + 1.5);
    wG.gain.exponentialRampToValueAtTime(0.0001, t + 1.9);
    w.connect(wG); wG.connect(audioCtx.destination);
    w.start(t); w.stop(t + 2.0);
  }, 100);
}

function onFirstGesture() { initAudio(); }
document.getElementById('startBtn').addEventListener('click',  onFirstGesture, { once: true });
document.addEventListener('keydown',                           onFirstGesture, { once: true });
canvas.addEventListener('touchstart',                          onFirstGesture, { once: true });

// ── Main Loop ─────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (state === 'playing' || state === 'dead') {
    if (state === 'playing') update(dt);
    updateExplosion(dt);
    // update coin particles
    particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 400*dt; p.life -= dt; });
    particles = particles.filter(p => p.life > 0);
  }
  updateEngineAudio(player.speed, LEVEL_SPEEDS[level - 1]);
  draw();
  requestAnimationFrame(loop);
}

// ── Update ────────────────────────────────────────────────────
function update(dt) {
  const maxSpeed = LEVEL_SPEEDS[level-1];

  if (player.falling) {
    player.fallVY += 850 * dt;
    player.fallY  += player.fallVY * dt;
    if (player.fallY > H * 2) showDead();
    return;
  }

  // Speed
  if (keys['ArrowUp'])   player.speed = Math.min(player.speed + 900*dt, maxSpeed);
  else                   player.speed = Math.max(player.speed - 160*dt, 0);
  if (keys['ArrowDown']) player.speed = Math.max(player.speed - 520*dt, 0);

  // Steering — scales with speed so car stays put when not moving
  const speedFrac  = player.speed / maxSpeed;
  const steerPower = speedFrac * (3.2 + speedFrac * 1.4) * dt;

  let steerInput = 0;
  if (joystickActive && Math.abs(joystickDelta) > JOY_DEAD) {
    const norm = (joystickDelta - Math.sign(joystickDelta)*JOY_DEAD) / (1 - JOY_DEAD);
    steerInput = Math.max(-1, Math.min(1, norm));
  } else if (!joystickActive) {
    if (keys['ArrowLeft'])  steerInput = -1;
    if (keys['ArrowRight']) steerInput =  1;
  }
  player.x += steerInput * steerPower;
  player.steer = steerInput;

  // Road curve drift (gentle, always steerable against)
  const segIdx = (Math.floor(roadOffset) % segments.length + segments.length) % segments.length;
  player.x -= (segments[segIdx]?.curve || 0) * player.speed * dt * 0.28;

  // Progress
  distanceTravelled += player.speed * dt;
  roadOffset        += player.speed * dt / SCROLL_DIV;

  // Timer countdown
  raceTimer -= dt;
  if (checkpointFlashT > 0) checkpointFlashT -= dt;
  if (raceTimer <= 0) { raceTimer = 0; showTimeUp(); return; }

  // Checkpoint detection
  if (checkpointsPassed < NUM_CHECKPOINTS && distanceTravelled >= nextCheckpointDist) {
    checkpointsPassed++;
    raceTimer += CHECKPOINT_BONUS;
    nextCheckpointDist = levelDistance * (checkpointsPassed + 1) / (NUM_CHECKPOINTS + 1);
    checkpointFlashT = 1.5;
    playCoinSound();
  }

  // Coin pick-up
  const cIdx = (Math.floor(roadOffset + 6) % segments.length + segments.length) % segments.length;
  if (segments[cIdx]?.coin && Math.abs(player.x) < 0.65) {
    segments[cIdx].coin = false;
    coins++;
    spawnParticles();
    playCoinSound();
    if (coins % COINS_PER_UPGRADE === 0) {
      carSkin = Math.min(carSkin + 1, CAR_SKINS.length - 1);
      showCarUpgrade();
    }
  }

  // Off-road fall (threshold matches ROAD_HALF)
  if (Math.abs(player.x) > 2.1 && !player.falling) {
    player.falling = true;
    player.fallVY  = -60;
    // Kill engine instantly
    if (audioReady && engineGain) {
      engineGain.gain.cancelScheduledValues(audioCtx.currentTime);
      engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
    }
    playExplosionSound();
    spawnExplosion();
  }

  // Level end
  if (distanceTravelled >= levelDistance) {
    if (level >= 10) { showWin(); return; }
    level++;
    distanceTravelled = 0;
    raceTimer += CHECKPOINT_BONUS; // bonus time for finishing a level
    checkpointsPassed = 0;
    nextCheckpointDist = levelDistance / (NUM_CHECKPOINTS + 1);
    buildRoad();
    roadOffset = 0;
    showLevelUp();
  }
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  drawDashboard();
  ctx.clearRect(0, 0, W, H);
  if (state === 'playing' || state === 'dead') {
    const style = getStyle();
    drawSky(style);
    drawRoad(style);
    drawCar();
    drawParticles();
    drawExplosion();
    if (player.falling) drawFall();
    drawTimer();
    if (checkpointFlashT > 0) drawCheckpointFlash();
  }
}

function drawTimer() {
  const secs = Math.ceil(raceTimer);
  const txt = secs < 10 ? '0' + secs : '' + secs;
  const urgent = raceTimer <= 5;
  ctx.save();
  ctx.font = 'bold 36px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = urgent ? '#ff2222' : '#ffffff';
  ctx.shadowColor = urgent ? '#ff0000' : '#000000';
  ctx.shadowBlur = urgent ? 16 : 6;
  if (urgent) ctx.globalAlpha = 0.6 + Math.sin(performance.now() * 0.012) * 0.4;
  ctx.fillText(txt, W / 2, 12);
  ctx.shadowBlur = 0;
  ctx.font = '10px Orbitron';
  ctx.fillStyle = urgent ? '#ff6666' : '#cccccc';
  ctx.globalAlpha = 1;
  ctx.fillText('TIME', W / 2, 50);
  ctx.restore();
}

function drawCheckpointFlash() {
  const a = Math.min(checkpointFlashT / 0.5, 1);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = 'bold 28px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14';
  ctx.shadowBlur = 20;
  ctx.fillText('CHECKPOINT +' + CHECKPOINT_BONUS + 's', W / 2, H * 0.18);
  ctx.restore();
}

function drawSky(style) {
  const horizonY = H * HORIZON;
  const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
  style.sky.forEach((c,i) => grad.addColorStop(i/(style.sky.length-1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, horizonY);

  if (style.stars) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let i = 0; i < 80; i++) {
      const sx = ((i*137 + roadOffset*1.8) % W + W) % W;
      const sy = (i*61) % (horizonY - 8);
      ctx.fillRect(sx, sy, i%3===0 ? 2 : 1.2, i%3===0 ? 2 : 1.2);
    }
  }

  // Mountains — two layers (far + near) with parallax
  drawMountains(horizonY, style);

  // Horizon haze
  const haze = ctx.createLinearGradient(0, horizonY-24, 0, horizonY);
  haze.addColorStop(0, 'transparent');
  haze.addColorStop(1, style.fog + 'aa');
  ctx.fillStyle = haze;
  ctx.fillRect(0, horizonY-24, W, 24);
}

function drawMountains(horizonY, style) {
  // Seeded pseudo-random for consistent mountain shapes per level
  const seed = (level * 7) + 13;
  function seededRand(n) { return ((Math.sin(n * 127.1 + seed * 311.7) * 43758.5453) % 1 + 1) % 1; }

  // Far mountains — lighter, taller, slower parallax
  const farScroll = (roadOffset * 0.15) % W;
  ctx.fillStyle = shadeColor(style.fog, -10);
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  for (let x = -40; x <= W + 40; x += 20) {
    const wx = x + farScroll;
    const peak = seededRand(Math.floor(wx / 120)) * 0.35 + 0.15;
    const localH = horizonY * peak;
    const xInPeak = (wx % 120) / 120;
    const env = Math.sin(xInPeak * Math.PI);
    ctx.lineTo(x, horizonY - localH * env);
  }
  ctx.lineTo(W + 40, horizonY);
  ctx.closePath();
  ctx.fill();

  // Near mountains — darker, shorter, faster parallax
  const nearScroll = (roadOffset * 0.35) % W;
  ctx.fillStyle = shadeColor(style.fog, -25);
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  for (let x = -40; x <= W + 40; x += 14) {
    const wx = x + nearScroll;
    const peak = seededRand(Math.floor(wx / 80) + 500) * 0.22 + 0.08;
    const localH = horizonY * peak;
    const xInPeak = (wx % 80) / 80;
    const env = Math.sin(xInPeak * Math.PI);
    ctx.lineTo(x, horizonY - localH * env);
  }
  ctx.lineTo(W + 40, horizonY);
  ctx.closePath();
  ctx.fill();

  // Tree line along near mountain base — small jagged silhouettes
  const treeScroll = (roadOffset * 0.4) % W;
  ctx.fillStyle = shadeColor(style.verge[0], -30);
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  for (let x = -10; x <= W + 10; x += 6) {
    const wx = x + treeScroll;
    const h = (seededRand(Math.floor(wx / 6) + 1000) * 10 + 4);
    ctx.lineTo(x, horizonY - h);
    ctx.lineTo(x + 3, horizonY - h * 0.5);
  }
  ctx.lineTo(W + 10, horizonY);
  ctx.closePath();
  ctx.fill();
}

function drawRoad(style) {
  const horizonY = H * HORIZON;
  const groundH  = H - horizonY;

  const gGrad = ctx.createLinearGradient(0, horizonY, 0, H);
  gGrad.addColorStop(0,   style.fog);
  gGrad.addColorStop(0.6, shadeColor(style.fog, -20));
  gGrad.addColorStop(1,   '#000');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, horizonY, W, groundH);

  const subOffset = 1 - (roadOffset - Math.floor(roadOffset));
  const startSeg  = Math.floor(roadOffset);

  const rows = [];
  const roadViewW = ROAD_VIEW_W;
  // First pass: project segments and accumulate hill offset
  let hillY = 0;
  for (let i = 0; i < DRAW_DIST; i++) {
    const segIdx  = (startSeg + i) % segments.length;
    const seg     = segments[segIdx];
    const depth   = i + 1.5 + subOffset;
    hillY += (seg.hill || 0) * (DRAW_DIST - i) * 5.5;
    const baseY   = Math.round(H - groundH * (1 - 1/depth));
    const screenY = Math.round(baseY + hillY / depth);
    const roadPx  = (ROAD_HALF * roadViewW * 0.5) / depth;
    if (screenY < horizonY || screenY >= H) continue;
    rows.push({ i, seg, screenY, roadPx });
  }

  // Accumulate curve near→far
  rows.sort((a,b) => b.screenY - a.screenY);
  let curvX = 0;
  for (const row of rows) {
    curvX += row.seg.curve * (row.i+1) * 1.8;
    row.cx = W/2 - player.x * row.roadPx * 0.5 + curvX;
  }

  // Paint far→near
  rows.sort((a,b) => a.screenY - b.screenY);
  for (let r = 0; r < rows.length; r++) {
    const { i, seg, screenY, roadPx, cx } = rows[r];
    const next   = rows[r + 1] ?? null;
    const absIdx = startSeg - i;
    const isEven = Math.floor(absIdx / 2) % 2 === 0;

    if (!next) {
      // Last strip: no rendered row beyond it, so extrapolate bottom corners
      // by continuing the direction from the previous row, projected to H.
      const prev     = rows[r - 1];
      const nRoadPx2 = roadPx + (prev ? (roadPx - prev.roadPx) * (H - screenY) / Math.max(1, screenY - prev.screenY) : 0);
      const nCx2     = cx - player.x * (nRoadPx2 - roadPx) * 0.5;
      const bandTop2    = screenY;
      const bandH2      = H - bandTop2;
      ctx.fillStyle = isEven ? style.verge[0] : style.verge[1];
      ctx.fillRect(0, bandTop2, W, bandH2);
      const rumbleW2  = Math.max(2, roadPx  * 0.09);
      const nRumbleW2 = Math.max(2, nRoadPx2 * 0.09);
      ctx.fillStyle = isEven ? '#ffffff' : '#cc1122';
      fillTrap(cx  - roadPx  - rumbleW2,  bandTop2, cx  + roadPx  + rumbleW2,  bandTop2,
               nCx2 + nRoadPx2 + nRumbleW2, H,     nCx2 - nRoadPx2 - nRumbleW2, H);
      ctx.fillStyle = isEven ? style.road : shadeColor(style.road, 10);
      fillTrap(cx  - roadPx, bandTop2, cx  + roadPx, bandTop2,
               nCx2 + nRoadPx2, H,    nCx2 - nRoadPx2, H);
      if (isEven) {
        const dashW2  = Math.max(1.5, roadPx  * 0.035);
        const nDashW2 = Math.max(1.5, nRoadPx2 * 0.035);
        ctx.fillStyle = style.stripe;
        fillTrap(cx  - dashW2, bandTop2, cx  + dashW2, bandTop2,
                 nCx2 + nDashW2, H,     nCx2 - nDashW2, H);
      }
      continue;
    }

    const nCx        = next.cx;
    const nRoadPx    = next.roadPx;
    const bandTop    = screenY;
    const bandBottom = next.screenY;
    const bandH      = bandBottom - bandTop;

    // Verge
    ctx.fillStyle = isEven ? style.verge[0] : style.verge[1];
    ctx.fillRect(0, bandTop, W, bandH);

    // Road surface
    // Draw full road+casing width in rumble colour first, then paint road
    // surface on top — eliminates any antialiasing gap at the shared edge.
    const rumbleW  = Math.max(2, roadPx  * 0.09);
    const nRumbleW = Math.max(2, nRoadPx * 0.09);
    ctx.fillStyle = isEven ? '#ffffff' : '#cc1122';
    fillTrap(cx  - roadPx  - rumbleW,  bandTop,    cx  + roadPx  + rumbleW,  bandTop,
             nCx + nRoadPx + nRumbleW, bandBottom, nCx - nRoadPx - nRumbleW, bandBottom);

    ctx.fillStyle = isEven ? style.road : shadeColor(style.road, 10);
    fillTrap(cx  - roadPx, bandTop, cx  + roadPx, bandTop,
             nCx + nRoadPx, bandBottom, nCx - nRoadPx, bandBottom);

    // Centre stripe
    if (isEven) {
      const dashW  = Math.max(1.5, roadPx  * 0.035);
      const nDashW = Math.max(1.5, nRoadPx * 0.035);
      ctx.fillStyle = style.stripe;
      fillTrap(cx  - dashW,  bandTop,    cx  + dashW,  bandTop,
               nCx + nDashW, bandBottom, nCx - nDashW, bandBottom);
    }

    // Coins
    if (seg.coin && i > 4 && i < DRAW_DIST - 8) {
      const coinR = Math.max(4, roadPx * 0.11);
      const coinY = bandTop - coinR * 1.5;
      ctx.save();
      ctx.fillStyle = '#39FF14';
      ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(cx, coinY, coinR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.max(6, Math.floor(coinR))}px Orbitron`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('₱', cx, coinY);
      ctx.restore();
    }
  }

  // Second pass: roadside objects (far→near, already sorted)
  for (let r = 0; r < rows.length; r++) {
    const { seg, screenY, roadPx, cx } = rows[r];
    if (roadPx < 3) continue;
    if (seg.cliff)      drawCliff(seg.cliff, cx, screenY, roadPx, style);
    if (seg.tree)       drawTree(seg.tree, cx, screenY, roadPx, style);
    if (seg.tires)      drawTirePile(seg.tires, cx, screenY, roadPx);
    if (seg.building)   drawBuilding(seg.building, cx, screenY, roadPx);
    if (seg.checkpoint) drawCheckpointGate(cx, screenY, roadPx);
    if (roadPx < 5) continue;
    if (seg.billboard)  drawBillboard(seg.billboard, cx, screenY, roadPx);
    if (seg.sign)       drawSign(seg.sign, cx, screenY, roadPx);
  }
}

function drawBillboard(bb, cx, screenY, roadPx) {
  const side  = bb.side === 'R' ? 1 : -1;
  const bx    = cx + side * roadPx * 2.7;
  const postH = roadPx * 0.9;
  const bw    = roadPx * 2.6;
  const bh    = roadPx * 1.1;
  if (bw < 10) return;

  const postW = Math.max(2, roadPx * 0.13);
  ctx.fillStyle = '#777777';
  ctx.fillRect(bx - bw * 0.28 - postW / 2, screenY - postH, postW, postH);
  ctx.fillRect(bx + bw * 0.28 - postW / 2, screenY - postH, postW, postH);

  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(bx - bw / 2, screenY - postH - bh, bw, bh);
  ctx.strokeStyle = '#39FF14';
  ctx.lineWidth = Math.max(1.5, roadPx * 0.09);
  ctx.strokeRect(bx - bw / 2, screenY - postH - bh, bw, bh);

  if (bw > 18) {
    ctx.save();
    ctx.rect(bx - bw / 2 + 1, screenY - postH - bh + 1, bw - 2, bh - 2);
    ctx.clip();
    const fs1 = Math.max(6, roadPx * 0.30);
    ctx.fillStyle = '#39FF14';
    ctx.font = `bold ${fs1}px Orbitron`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(bb.line1, bx, screenY - postH - bh * 0.65);
    const fs2 = Math.max(5, roadPx * 0.20);
    ctx.fillStyle = '#cccccc';
    ctx.font = `${fs2}px 'Share Tech Mono', monospace`;
    ctx.fillText(bb.line2, bx, screenY - postH - bh * 0.25);
    ctx.restore();
  }
}

function drawSign(sg, cx, screenY, roadPx) {
  const side  = sg.side === 'R' ? 1 : -1;
  const bx    = cx + side * roadPx * 2.1;
  const postH = roadPx * 0.4;
  const sw    = roadPx * 1.0;
  if (sw < 6) return;

  const postW = Math.max(1.5, roadPx * 0.09);
  ctx.fillStyle = '#999999';
  ctx.fillRect(bx - postW / 2, screenY - postH, postW, postH);

  const top = screenY - postH - sw * 0.75;
  if (sg.type === 'warn') {
    // Yellow diamond
    ctx.save();
    ctx.translate(bx, top + sw * 0.375);
    ctx.rotate(Math.PI / 4);
    const hs = sw * 0.38;
    ctx.fillStyle = '#39FF14';
    ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = Math.max(1, roadPx * 0.05);
    ctx.strokeRect(-hs, -hs, hs * 2, hs * 2);
    ctx.restore();
    if (sw > 12) {
      ctx.save();
      const fs = Math.max(4, sw * 0.18);
      ctx.fillStyle = '#000000';
      ctx.font = `bold ${fs}px Orbitron`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sg.line1, bx, top + sw * 0.28);
      ctx.fillText(sg.line2, bx, top + sw * 0.50);
      ctx.restore();
    }
  } else {
    // Green rectangle info sign
    ctx.fillStyle = '#006633';
    ctx.fillRect(bx - sw / 2, top, sw, sw * 0.75);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1, roadPx * 0.05);
    ctx.strokeRect(bx - sw / 2, top, sw, sw * 0.75);
    if (sw > 12) {
      const fs = Math.max(4, sw * 0.18);
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${fs}px Orbitron`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sg.line1, bx, top + sw * 0.27);
      ctx.fillText(sg.line2, bx, top + sw * 0.55);
    }
  }
}

function drawCliff(cl, cx, screenY, roadPx, style) {
  const seed = cl.seed;
  function srand(n) { return ((Math.sin(n * 127.1 + seed * 43.7) * 43758.5) % 1 + 1) % 1; }

  const baseColor = shadeColor(style.fog, -35);
  const lightColor = shadeColor(style.fog, -15);
  const darkColor = shadeColor(style.fog, -55);

  [1, -1].forEach(side => {
    const cliffX = cx + side * roadPx * 1.9;
    const cliffW = roadPx * 1.4;
    if (cliffW < 2) return;

    // Cliff always extends from road to top of screen
    const top = -10; // above canvas top
    const fullH = screenY - top;

    // Main rock wall — full height rectangle with jagged inner edge
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.moveTo(cliffX - cliffW * 0.5 * side, screenY);
    ctx.lineTo(cliffX - cliffW * 0.5 * side, top);
    ctx.lineTo(cliffX + cliffW * 0.5 * side, top);
    // Jagged inner edge (facing road)
    const steps = Math.max(3, Math.floor(fullH / 20));
    for (let s = 0; s < steps; s++) {
      const sy = top + (fullH * s / steps);
      const jag = srand(seed + side * 100 + s) * cliffW * 0.25;
      ctx.lineTo(cliffX + (cliffW * 0.5 - jag) * side, sy);
    }
    ctx.lineTo(cliffX + cliffW * 0.5 * side, screenY);
    ctx.closePath();
    ctx.fill();

    // Light streak (vertical highlight)
    ctx.fillStyle = lightColor;
    const streakX = cliffX + side * cliffW * 0.05;
    const streakW = Math.max(2, cliffW * 0.2);
    ctx.fillRect(streakX - streakW / 2, top, streakW, fullH);

    // Dark vertical crevice
    ctx.fillStyle = darkColor;
    const crevX = cliffX - side * cliffW * 0.15;
    const crevW = Math.max(1, cliffW * 0.1);
    ctx.fillRect(crevX - crevW / 2, top, crevW, fullH);

    // Horizontal ledge lines
    if (cliffW > 5) {
      ctx.fillStyle = lightColor;
      const ledgeCount = Math.max(1, Math.floor(fullH / 40));
      for (let l = 0; l < ledgeCount; l++) {
        const ly = top + fullH * (0.15 + 0.7 * srand(seed + side + l * 13));
        const lw = cliffW * (0.4 + srand(seed + side + l * 7 + 50) * 0.4);
        ctx.fillRect(cliffX - lw * 0.3 * side, ly, lw, Math.max(1, roadPx * 0.03));
      }
    }
  });
}

function drawTree(tr, cx, screenY, roadPx, style) {
  const sides = tr.side === 'B' ? [1, -1] : [tr.side === 'R' ? 1 : -1];
  const baseGreen = style.verge[0];
  const lightGreen = style.verge[1];
  const darkGreen = shadeColor(baseGreen, -25);

  sides.forEach(side => {
    const tx = cx + side * roadPx * (2.2 + (tr.variant % 3) * 0.35);
    const v = tr.variant;

    if (v === 0) {
      // Round bushy tree
      const trunkH = roadPx * 0.65;
      const trunkW = Math.max(2, roadPx * 0.13);
      const cr = roadPx * 0.5;
      if (cr < 2) return;
      ctx.fillStyle = '#665533';
      ctx.fillRect(tx - trunkW / 2, screenY - trunkH, trunkW, trunkH);
      const cy = screenY - trunkH - cr * 0.4;
      ctx.fillStyle = baseGreen;
      ctx.beginPath(); ctx.arc(tx, cy, cr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = lightGreen;
      ctx.beginPath(); ctx.arc(tx - cr * 0.25, cy - cr * 0.2, cr * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = darkGreen;
      ctx.beginPath(); ctx.arc(tx + cr * 0.3, cy + cr * 0.25, cr * 0.45, 0, Math.PI * 2); ctx.fill();

    } else if (v === 1) {
      // Tall pine / conifer — triangle layers
      const trunkH = roadPx * 0.9;
      const trunkW = Math.max(2, roadPx * 0.10);
      const treeW = roadPx * 0.45;
      if (treeW < 2) return;
      ctx.fillStyle = '#554422';
      ctx.fillRect(tx - trunkW / 2, screenY - trunkH * 0.35, trunkW, trunkH * 0.35);
      // Three stacked triangles
      for (let layer = 0; layer < 3; layer++) {
        const ly = screenY - trunkH * 0.3 - layer * trunkH * 0.25;
        const lw = treeW * (1 - layer * 0.2);
        ctx.fillStyle = layer === 0 ? darkGreen : layer === 1 ? baseGreen : lightGreen;
        ctx.beginPath();
        ctx.moveTo(tx, ly - trunkH * 0.35);
        ctx.lineTo(tx + lw, ly);
        ctx.lineTo(tx - lw, ly);
        ctx.closePath();
        ctx.fill();
      }

    } else if (v === 2) {
      // Small bush — low and wide, no trunk
      const bw = roadPx * 0.4;
      const bh = roadPx * 0.25;
      if (bw < 2) return;
      const by = screenY - bh * 0.6;
      ctx.fillStyle = darkGreen;
      ctx.beginPath(); ctx.ellipse(tx, by, bw, bh, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = baseGreen;
      ctx.beginPath(); ctx.ellipse(tx - bw * 0.15, by - bh * 0.2, bw * 0.75, bh * 0.7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = lightGreen;
      ctx.beginPath(); ctx.ellipse(tx - bw * 0.2, by - bh * 0.3, bw * 0.4, bh * 0.4, 0, 0, Math.PI * 2); ctx.fill();

    } else {
      // Wide oak — thick trunk, broad canopy
      const trunkH = roadPx * 0.55;
      const trunkW = Math.max(3, roadPx * 0.18);
      const cr = roadPx * 0.65;
      if (cr < 2) return;
      ctx.fillStyle = '#5a4428';
      ctx.fillRect(tx - trunkW / 2, screenY - trunkH, trunkW, trunkH);
      const cy = screenY - trunkH - cr * 0.3;
      // Wide canopy — three overlapping circles
      ctx.fillStyle = darkGreen;
      ctx.beginPath(); ctx.arc(tx + cr * 0.4, cy + cr * 0.1, cr * 0.55, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = baseGreen;
      ctx.beginPath(); ctx.arc(tx - cr * 0.3, cy, cr * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = lightGreen;
      ctx.beginPath(); ctx.arc(tx + cr * 0.05, cy - cr * 0.15, cr * 0.65, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = baseGreen;
      ctx.beginPath(); ctx.arc(tx + cr * 0.35, cy - cr * 0.05, cr * 0.5, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function drawTirePile(tp, cx, screenY, roadPx) {
  const side = tp.side === 'R' ? 1 : -1;
  const baseX = cx + side * roadPx * 2.1;
  const tireR = Math.max(2, roadPx * 0.14);
  if (tireR < 2) return;
  const count = tp.count;

  // Bottom row
  for (let c = 0; c < count; c++) {
    const tx = baseX + (c - (count - 1) / 2) * tireR * 1.8;
    // Outer tire (dark rubber)
    ctx.fillStyle = '#333333';
    ctx.beginPath();
    ctx.ellipse(tx, screenY - tireR, tireR, tireR * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Inner hub
    ctx.fillStyle = '#555555';
    ctx.beginPath();
    ctx.ellipse(tx, screenY - tireR, tireR * 0.5, tireR * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Top row (one fewer tire, stacked on top)
  if (count > 1) {
    for (let c = 0; c < count - 1; c++) {
      const tx = baseX + (c - (count - 2) / 2) * tireR * 1.8;
      const ty = screenY - tireR * 2.2;
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.ellipse(tx, ty, tireR, tireR * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4a4a4a';
      ctx.beginPath();
      ctx.ellipse(tx, ty, tireR * 0.5, tireR * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawCheckpointGate(cx, screenY, roadPx) {
  const postSpan = roadPx * 1.15;  // half-width between posts (just outside road)
  const postW = Math.max(3, roadPx * 0.14);
  const postH = roadPx * 1.6;
  const bannerH = roadPx * 0.45;
  if (postW < 2) return;

  const leftX  = cx - postSpan;
  const rightX = cx + postSpan;
  const topY   = screenY - postH;

  // Posts — white with red/white candy stripe
  [leftX, rightX].forEach(px => {
    ctx.fillStyle = '#eeeeee';
    ctx.fillRect(px - postW / 2, topY, postW, postH);
    // Candy stripes
    const stripeCount = Math.max(2, Math.floor(postH / (postW * 1.5)));
    const stripeH = postH / (stripeCount * 2);
    ctx.fillStyle = '#dd2222';
    for (let s = 0; s < stripeCount; s++) {
      ctx.fillRect(px - postW / 2, topY + s * stripeH * 2, postW, stripeH);
    }
  });

  // Cross-beam / banner
  const bannerY = topY;
  ctx.fillStyle = '#222222';
  ctx.fillRect(leftX - postW / 2, bannerY, rightX - leftX + postW, bannerH);

  // Checkerboard pattern on banner edges
  const checkSize = Math.max(2, bannerH * 0.25);
  const bannerLeft = leftX - postW / 2;
  const bannerWidth = rightX - leftX + postW;
  ctx.fillStyle = '#ffffff';
  const cols = Math.floor(bannerWidth / checkSize);
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < cols; c++) {
      if ((r + c) % 2 === 0) {
        ctx.fillRect(bannerLeft + c * checkSize, bannerY + r * checkSize, checkSize, checkSize);
      }
    }
  }

  // "CHECKPOINT" text
  if (bannerH > 6) {
    ctx.save();
    const fs = Math.max(6, bannerH * 0.45);
    ctx.font = `bold ${fs}px Orbitron`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#39FF14';
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 8;
    ctx.fillText('CHECKPOINT', cx, bannerY + bannerH * 0.6);
    ctx.restore();
  }
}

function drawBuilding(bd, cx, screenY, roadPx) {
  const sides = bd.side === 'B' ? [1, -1] : [bd.side === 'R' ? 1 : -1];
  const v = bd.variant;

  // Building palette by variant
  const palettes = [
    { wall:'#8888aa', shade:'#666688', roof:'#cc4444', win:'#aaddff', winLit:'#ffee88' },
    { wall:'#bbaa88', shade:'#998866', roof:'#885533', win:'#88ccee', winLit:'#ffdd66' },
    { wall:'#999999', shade:'#777777', roof:'#556677', win:'#aaccdd', winLit:'#ffcc44' },
    { wall:'#aa9988', shade:'#887766', roof:'#cc6633', win:'#99bbcc', winLit:'#ffffaa' },
    { wall:'#7799aa', shade:'#557788', roof:'#445566', win:'#bbddee', winLit:'#ffee77' },
  ];
  const pal = palettes[v % palettes.length];

  sides.forEach(side => {
    const bx = cx + side * roadPx * (2.3 + (v % 3) * 0.3);
    // Heights vary by variant
    const heights = [1.6, 2.2, 1.2, 1.8, 2.6];
    const bh = roadPx * heights[v % 5];
    const bw = roadPx * 0.9;
    if (bw < 4) return;

    const top = screenY - bh;

    // Main wall
    ctx.fillStyle = pal.wall;
    ctx.fillRect(bx - bw / 2, top, bw, bh);

    // Shaded side edge (gives 3D look)
    ctx.fillStyle = pal.shade;
    ctx.fillRect(bx - bw / 2, top, bw * 0.15, bh);

    // Roof
    ctx.fillStyle = pal.roof;
    ctx.fillRect(bx - bw / 2 - bw * 0.05, top - bh * 0.06, bw * 1.1, bh * 0.08);

    // Windows — grid
    if (bw > 8) {
      const cols = Math.min(3, Math.max(1, Math.floor(bw / 8)));
      const rows = Math.min(5, Math.max(1, Math.floor(bh / (roadPx * 0.35))));
      const winW = bw * 0.16;
      const winH = bh * 0.08;
      const gapX = (bw * 0.7) / (cols + 1);
      const gapY = (bh * 0.85) / (rows + 1);
      const startX = bx - bw * 0.35;
      const startY = top + bh * 0.1;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const wx = startX + gapX * (c + 1) - winW / 2;
          const wy = startY + gapY * (r + 1) - winH / 2;
          // Some windows lit, some dark
          const lit = ((v + r * 3 + c * 7) % 5) < 2;
          ctx.fillStyle = lit ? pal.winLit : pal.win;
          ctx.fillRect(wx, wy, winW, winH);
        }
      }
    }
  });
}

function fillTrap(x0, y0, x1, y1, x2, y2, x3, y3) {
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.closePath();
  ctx.fill();
}


function shadeColor(hex, pct) {
  if (!hex || hex.startsWith('rgb')) {
    const m = (hex||'').match(/\d+/g);
    if (m) return `rgb(${Math.min(255,Math.max(0,+m[0]+pct))},${Math.min(255,Math.max(0,+m[1]+pct))},${Math.min(255,Math.max(0,+m[2]+pct))})`;
    return hex;
  }
  const n = parseInt(hex.replace('#','').padEnd(6,'0'), 16);
  return `rgb(${Math.min(255,Math.max(0,(n>>16)+pct))},${Math.min(255,Math.max(0,((n>>8)&0xff)+pct))},${Math.min(255,Math.max(0,(n&0xff)+pct))})`;
}

// ── Exhaust plume ─────────────────────────────────────────────
function drawExhaust(cx, cy, cw, ch) {
  const maxSpeed = LEVEL_SPEEDS[Math.min(level - 1, LEVEL_SPEEDS.length - 1)];
  const sr = Math.max(0, player.speed / maxSpeed); // speed ratio 0..1
  if (sr < 0.04) return;

  const t = performance.now() * 0.001;
  // Two pipe mouths just inside the tail-light positions
  const pipes = [cx - cw * 0.28, cx + cw * 0.28];
  const rearY = cy + ch / 2;

  pipes.forEach(px => {
    // Draw puffs from oldest (back) to newest (front) so newer ones overlap
    for (let i = 5; i >= 0; i--) {
      const prog = ((t * 2.8 + i * 0.26) % 1); // 0 = fresh at pipe, 1 = dissipated
      const py    = rearY + 3 + prog * 34 * sr;
      const drift = Math.sin(t * 2.1 + i * 1.4 + px) * 2.8 * prog;
      const r     = 2.2 + prog * 8 * sr;
      const alpha = (1 - prog) * 0.62 * sr;

      let fill;
      if (prog < 0.28 && sr > 0.55) {
        // Flame / heat at pipe mouth – colour shifts with speed
        if (sr > 0.88) {
          fill = 'rgba(190,230,255,1)';          // blue-white jet flame
        } else {
          const heat = (sr - 0.55) / 0.33;
          const g = Math.floor(200 - 140 * heat);
          fill = `rgba(255,${g},20,1)`;           // orange → yellow
        }
      } else {
        // Smoke – lightens and expands as it drifts back
        const gray = Math.floor(110 + 110 * prog);
        fill = `rgba(${gray},${gray},${gray},1)`;
      }

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.arc(px + drift, py, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  });
}

// ── Car ───────────────────────────────────────────────────────
function drawCar() {
  if (player.falling) return;
  const cx = W/2, cy = H*0.75;
  const skin = CAR_SKINS[carSkin];

  const isLandscape = W > H;
  if (isLandscape) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(2, 2);
    ctx.translate(-cx, -cy);
  }

  // Yaw: rotate nose into the curve direction
  // Lean: shift body outward (opposite to steer) simulating body roll
  const steerVal = player.steer || 0;
  const speedFrac = Math.min(player.speed / (LEVEL_SPEEDS[Math.min(level-1, LEVEL_SPEEDS.length-1)] || 1), 1);
  const yawAngle = steerVal * 0.14 * speedFrac;  // yaw only when moving
  const leanPx   = -steerVal * 2 * speedFrac;    // lean only when moving
  ctx.save();
  ctx.translate(cx + leanPx, cy);
  ctx.rotate(yawAngle);
  ctx.translate(-cx - leanPx, -cy);

  // Exhaust plume (behind car body)
  drawExhaust(cx, cy, 74, 34);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 22, 42, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // === Rear wheels (wide, exposed, behind body) ===
  [[-32, 6], [32, 6]].forEach(([ox, oy]) => {
    // Tire
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(cx + ox - 11, cy + oy - 8, 22, 16, 3);
    ctx.fill();
    // Tread highlight
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.roundRect(cx + ox - 10, cy + oy - 6, 20, 12, 2);
    ctx.fill();
    // Hub
    ctx.fillStyle = skin.hub;
    ctx.beginPath();
    ctx.ellipse(cx + ox, cy + oy, 5, 5, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // === Rear axle / diffuser ===
  ctx.fillStyle = '#333';
  ctx.fillRect(cx - 30, cy + 12, 60, 3);

  // === Rear wing ===
  // Wing endplates
  ctx.fillStyle = skin.body;
  ctx.fillRect(cx - 34, cy - 14, 4, 14);
  ctx.fillRect(cx + 30, cy - 14, 4, 14);
  // Wing main plane
  const wingGrad = ctx.createLinearGradient(cx, cy - 16, cx, cy - 8);
  wingGrad.addColorStop(0, skin.roofA);
  wingGrad.addColorStop(1, skin.roofB);
  ctx.fillStyle = wingGrad;
  ctx.fillRect(cx - 34, cy - 16, 68, 5);
  // Wing flap
  ctx.fillStyle = skin.stripe;
  ctx.fillRect(cx - 32, cy - 10, 64, 3);

  // === Main body (narrow F1 monocoque) ===
  ctx.fillStyle = skin.body;
  ctx.beginPath();
  ctx.moveTo(cx - 14, cy + 14);    // rear left
  ctx.lineTo(cx - 16, cy - 4);     // widens at sidepods
  ctx.lineTo(cx - 12, cy - 22);    // narrows toward nose
  ctx.lineTo(cx - 6,  cy - 38);    // nose tip left
  ctx.lineTo(cx + 6,  cy - 38);    // nose tip right
  ctx.lineTo(cx + 12, cy - 22);    // narrows toward nose
  ctx.lineTo(cx + 16, cy - 4);     // widens at sidepods
  ctx.lineTo(cx + 14, cy + 14);    // rear right
  ctx.closePath();
  ctx.fill();

  // Body stripe (livery)
  ctx.fillStyle = skin.stripe;
  ctx.beginPath();
  ctx.moveTo(cx - 2, cy + 12);
  ctx.lineTo(cx - 3, cy - 36);
  ctx.lineTo(cx + 3, cy - 36);
  ctx.lineTo(cx + 2, cy + 12);
  ctx.closePath();
  ctx.fill();

  // === Sidepods ===
  ctx.fillStyle = shadeColor(skin.body, 15);
  // Left sidepod
  ctx.beginPath();
  ctx.roundRect(cx - 20, cy - 8, 8, 18, 2);
  ctx.fill();
  // Right sidepod
  ctx.beginPath();
  ctx.roundRect(cx + 12, cy - 8, 8, 18, 2);
  ctx.fill();

  // === Cockpit ===
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(cx, cy - 14, 6, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // Air intake (above driver head)
  ctx.fillStyle = skin.roofA;
  ctx.beginPath();
  ctx.moveTo(cx - 4, cy - 20);
  ctx.lineTo(cx,     cy - 26);
  ctx.lineTo(cx + 4, cy - 20);
  ctx.closePath();
  ctx.fill();

  // Driver helmet
  ctx.fillStyle = skin.roofA;
  ctx.beginPath();
  ctx.arc(cx, cy - 16, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = skin.roofB;
  ctx.beginPath();
  ctx.arc(cx, cy - 15, 3, 0, Math.PI);
  ctx.fill();

  // === Front wheels (smaller, further forward, steerable) ===
  const steer = player.steer || 0;
  const steerAngle = steer * 0.45; // max ~25 degrees
  [[-18, -28], [18, -28]].forEach(([ox, oy]) => {
    // Suspension arm
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx + ox * 0.4, cy + oy + 4);
    ctx.lineTo(cx + ox, cy + oy);
    ctx.stroke();
    // Tire (rotated for steering)
    ctx.save();
    ctx.translate(cx + ox, cy + oy);
    ctx.rotate(steerAngle);
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(-7, -5, 14, 10, 2);
    ctx.fill();
    ctx.fillStyle = skin.hub;
    ctx.beginPath();
    ctx.ellipse(0, 0, 3, 3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // === Front nose tip ===
  ctx.fillStyle = skin.stripe;
  ctx.beginPath();
  ctx.moveTo(cx - 4, cy - 36);
  ctx.lineTo(cx,     cy - 42);
  ctx.lineTo(cx + 4, cy - 36);
  ctx.closePath();
  ctx.fill();

  // === Front wing ===
  ctx.fillStyle = skin.roofA;
  ctx.fillRect(cx - 24, cy - 40, 48, 3);
  ctx.fillStyle = skin.stripe;
  ctx.fillRect(cx - 22, cy - 37, 44, 2);

  // Tail-lights (on rear wing endplates)
  ctx.fillStyle = 'rgba(255,40,40,0.9)';
  ctx.shadowColor = 'rgba(255,0,0,0.6)'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.ellipse(cx - 32, cy - 2, 3, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 32, cy - 2, 3, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore(); // steer tilt
  if (isLandscape) ctx.restore();
}

function drawFall() {
  const fy = H * 0.72 + player.fallY;
  ctx.save();
  ctx.translate(W/2, fy);
  ctx.rotate(player.fallY * 0.012);
  const s = 1 - Math.min(player.fallY / (H*3), 0.9);
  ctx.scale(s, s);
  // Simplified F1 silhouette
  ctx.fillStyle = '#141414';
  ctx.beginPath();
  ctx.moveTo(-14, 14); ctx.lineTo(-16, -4); ctx.lineTo(-12, -22);
  ctx.lineTo(-6, -38); ctx.lineTo(6, -38); ctx.lineTo(12, -22);
  ctx.lineTo(16, -4); ctx.lineTo(14, 14); ctx.closePath();
  ctx.fill();
  // Rear wing
  ctx.fillStyle = '#39FF14';
  ctx.fillRect(-34, -16, 68, 5);
  // Front wing
  ctx.fillRect(-24, -40, 48, 3);
  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  for (let i = 0; i < 80; i++) {
    ctx.fillRect((i*197 + player.fallY*0.55) % W, (i*113 + player.fallY*1.25) % H, 1.5, 1.5);
  }

  ctx.fillStyle = '#39FF14';
  ctx.font = 'bold 22px Orbitron';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 20;
  ctx.fillText('FELL OFF THE ROAD', W/2, H*0.28);
  ctx.shadowBlur = 0;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.min(p.life * 2, 1);
    ctx.fillStyle = '#39FF14';
    ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 8;
    ctx.font = 'bold 13px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillText('₱', p.x, p.y);
    ctx.restore();
  });
}

// ── Dashboard ─────────────────────────────────────────────────
function drawDashboard() {
  dctx.clearRect(0, 0, DW, DH);

  const bg = dctx.createLinearGradient(0, 0, 0, DH);
  bg.addColorStop(0, '#181818'); bg.addColorStop(1, '#0a0a0a');
  dctx.fillStyle = bg; dctx.fillRect(0, 0, DW, DH);

  dctx.beginPath(); dctx.moveTo(0, DH-1); dctx.lineTo(DW, DH-1);
  dctx.strokeStyle = 'rgba(57,255,20,0.2)'; dctx.lineWidth = 1; dctx.stroke();

  // Zone dividers separating dial pairs from scrolling centre
  const cx0 = Math.round(DW * 0.32);
  const cx1 = Math.round(DW * 0.68);
  dctx.strokeStyle = 'rgba(57,255,20,0.22)'; dctx.lineWidth = 1;
  dctx.beginPath(); dctx.moveTo(cx0, 5); dctx.lineTo(cx0, DH-5); dctx.stroke();
  dctx.beginPath(); dctx.moveTo(cx1, 5); dctx.lineTo(cx1, DH-5); dctx.stroke();

  // Scrolling level name in centre zone
  if (state === 'playing') {
    const txt = getStyle().name;
    dctx.font = '900 13px Orbitron';
    const txtW = dctx.measureText(txt).width;
    if (dashTextX < 0) dashTextX = cx1 + txtW / 2 + 16;
    dashTextX -= 1.1;
    if (dashTextX < cx0 - txtW / 2 - 16) dashTextX = cx1 + txtW / 2 + 16;

    dctx.save();
    dctx.beginPath(); dctx.rect(cx0, 0, cx1 - cx0, DH); dctx.clip();
    dctx.textAlign = 'center'; dctx.textBaseline = 'middle';
    dctx.shadowColor = '#39FF14'; dctx.shadowBlur = 20;
    dctx.fillStyle = '#39FF14';
    dctx.fillText(txt, dashTextX, DH / 2);
    dctx.restore();
  }

  const dials = [
    { x:DW*0.07, label:'SPEED', value:Math.min(player.speed,420), max:420,   isSpeed:true  },
    { x:DW*0.22, label:'LEVEL', value:level,                      max:10,    isSpeed:false },
    { x:DW*0.78, label:'COINS', value:coins,                      max:50,    isSpeed:false },
    { x:DW*0.93, label:'CHKPT', value:checkpointsPassed,          max:NUM_CHECKPOINTS, isSpeed:false },
  ];
  dials.forEach(d => drawDial(d.x, DH*0.5, 17, d));
}

function drawDial(cx, cy, r, info) {
  const c          = dctx;
  const pct        = Math.min(info.value / info.max, 1);
  const atMax      = info.isSpeed && pct >= 0.99;
  const startAngle = Math.PI * 0.75;
  const arcSpan    = Math.PI * 1.5;
  const colour     = atMax       ? '#00ff44'
                   : pct > 0.8   ? '#ff4422'
                   : pct > 0.5   ? '#39FF14'
                   :                '#00ccbb';
  c.save();

  // Outer glow ring
  c.beginPath(); c.arc(cx, cy, r+4, 0, Math.PI*2);
  c.strokeStyle = atMax ? 'rgba(0,255,68,0.22)' : 'rgba(57,255,20,0.09)';
  c.lineWidth = 4; c.stroke();

  // Face
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2);
  c.fillStyle = '#0c0c0c'; c.fill();
  c.strokeStyle = atMax ? '#00ff44' : '#39FF14'; c.lineWidth = 1.5; c.stroke();

  // Background track
  c.beginPath(); c.arc(cx, cy, r-5, startAngle, startAngle+arcSpan);
  c.strokeStyle = 'rgba(255,255,255,0.07)'; c.lineWidth = 5; c.lineCap = 'round'; c.stroke();

  // Filled arc
  if (pct > 0) {
    c.beginPath(); c.arc(cx, cy, r-5, startAngle, startAngle+arcSpan*pct);
    c.strokeStyle = colour; c.lineWidth = 5; c.lineCap = 'round'; c.stroke();
  }

  // Ticks
  for (let t = 0; t <= 4; t++) {
    const ta = startAngle + arcSpan*(t/4);
    c.beginPath();
    c.moveTo(cx+Math.cos(ta)*(r-10), cy+Math.sin(ta)*(r-10));
    c.lineTo(cx+Math.cos(ta)*(r- 4), cy+Math.sin(ta)*(r- 4));
    c.strokeStyle = 'rgba(255,255,255,0.2)'; c.lineWidth = 1; c.stroke();
  }

  // Needle
  const na = startAngle + arcSpan*pct;
  c.beginPath();
  c.moveTo(cx, cy);
  c.lineTo(cx+Math.cos(na)*(r-9), cy+Math.sin(na)*(r-9));
  c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.lineCap = 'round'; c.stroke();

  // Centre pip
  c.beginPath(); c.arc(cx, cy, 2.5, 0, Math.PI*2); c.fillStyle = '#39FF14'; c.fill();

  if (atMax) {
    c.save();
    c.translate(cx, cy-9);
    c.scale(0.72 + Math.sin(Date.now()*0.008)*0.14, 0.72 + Math.sin(Date.now()*0.008)*0.14);
    drawLeaf(c);
    c.restore();
    c.font = 'bold 8px Orbitron'; c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='#00ff44'; c.shadowColor='#00ff44'; c.shadowBlur=8;
    c.fillText('4:20', cx, cy+17); c.shadowBlur=0;
  } else {
    c.font = `bold ${info.isSpeed?9:8}px Share Tech Mono`;
    c.textAlign='center'; c.textBaseline='middle'; c.fillStyle=colour;
    const display = info.isSpeed         ? Math.floor(info.value)
                  : info.label==='CHKPT' ? info.value+'/'+NUM_CHECKPOINTS
                  : info.label==='LEVEL' ? info.value+'/10'
                  : info.value;
    c.fillText(display, cx, cy+16);
  }

  c.font='7px Orbitron'; c.textAlign='center'; c.textBaseline='middle';
  c.fillStyle='rgba(57,255,20,0.38)';
  c.fillText(info.label, cx, cy+r+7);
  c.restore();
}

function drawLeaf(c) {
  c.save();
  for (let i = 0; i < 7; i++) {
    c.save(); c.rotate((i/7)*Math.PI*2 - Math.PI/2);
    c.beginPath();
    c.moveTo(0,0);
    c.bezierCurveTo( 3,-5, 8,-15, 0,-20);
    c.bezierCurveTo(-8,-15,-3,-5, 0,  0);
    c.fillStyle='#00cc44'; c.shadowColor='#00ff44'; c.shadowBlur=6; c.fill();
    c.restore();
  }
  c.beginPath(); c.moveTo(0,0); c.lineTo(0,7);
  c.strokeStyle='#00cc44'; c.lineWidth=1.5; c.lineCap='round'; c.stroke();
  c.restore();
}

// ── State ─────────────────────────────────────────────────────
function startGame() {
  state='playing'; level=1; coins=0; distanceTravelled=0; carSkin=0;
  player={ x:0, speed:0, falling:false, fallY:0, fallVY:0 };
  raceTimer=START_TIME; checkpointsPassed=0; nextCheckpointDist=levelDistance/(NUM_CHECKPOINTS+1); checkpointFlashT=0;
  buildRoad(); roadOffset=0; particles=[]; explodeParticles=[];
  const ov=document.getElementById('overlay');
  ov.querySelector('.eyebrow').style.visibility='visible';
  ov.querySelector('.drive-label').style.visibility='visible';
  ov.querySelector('h1').textContent='SLIME RACER';
  ov.style.display='none';
  showLevelUp();
}

function showDead() {
  state='dead';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').textContent='REKT!';
  ov.querySelector('.eyebrow').style.visibility='hidden';
  ov.querySelector('.drive-label').style.visibility='hidden';
  document.getElementById('overlayMsg').textContent=`COLLECTED ${coins} COINS — TRY AGAIN`;
  document.getElementById('startBtn').textContent='RETRY';
}

function showTimeUp() {
  state='dead';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').textContent='TIME UP!';
  ov.querySelector('.eyebrow').style.visibility='hidden';
  ov.querySelector('.drive-label').style.visibility='hidden';
  document.getElementById('overlayMsg').textContent=`LEVEL ${level} — COLLECTED ${coins} COINS`;
  document.getElementById('startBtn').textContent='RETRY';
}

function showWin() {
  state='win';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').textContent='YOU WIN';
  ov.querySelector('.eyebrow').style.visibility='hidden';
  ov.querySelector('.drive-label').style.visibility='hidden';
  document.getElementById('overlayMsg').textContent=`${coins} COINS COLLECTED — RACE COMPLETE!`;
  document.getElementById('startBtn').textContent='PLAY AGAIN';
}

function showCarUpgrade() {
  const skin = CAR_SKINS[carSkin];
  const el = document.createElement('div');
  el.style.cssText = `
    position:absolute; top:9%; left:50%;
    transform:translate(-50%,0) scale(0.7);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    pointer-events:none; z-index:16; opacity:0;
    transition:transform 0.3s cubic-bezier(.175,.885,.32,1.4), opacity 0.3s;
  `;
  el.innerHTML = `
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.5)">CAR UPGRADE</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:5px;color:${skin.roofA};text-shadow:0 0 20px ${skin.roofA}88">${skin.name}</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.35)">${carSkin + 1} / ${CAR_SKINS.length}</div>
  `;
  document.getElementById('wrapper').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transform = 'translate(-50%,0) scale(1)';
    el.style.opacity   = '1';
  }));
  setTimeout(() => {
    el.style.opacity   = '0';
    el.style.transform = 'translate(-50%,0) scale(1.08)';
    setTimeout(() => el.remove(), 350);
  }, 1600);
}

function showLevelUp() {
  const style = artStyles[level - 1];
  const flash = document.createElement('div');
  flash.style.cssText=`
    position:absolute; top:26%; left:50%;
    transform:translate(-50%,-50%) scale(0.6);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    pointer-events:none; z-index:15;
    transition:transform 0.28s cubic-bezier(.175,.885,.32,1.5), opacity 0.28s;
    opacity:0;
  `;
  flash.innerHTML=`
    <div style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:5px;color:rgba(57,255,20,0.6)">LEVEL ${level}</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(22px,6vw,36px);font-weight:900;color:#39FF14;letter-spacing:6px;text-shadow:0 0 40px #39FF14,0 0 80px #39FF1455;white-space:nowrap">${style.name}</div>
  `;
  document.getElementById('wrapper').appendChild(flash);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    flash.style.transform='translate(-50%,-50%) scale(1)';
    flash.style.opacity='1';
  }));
  setTimeout(()=>{
    flash.style.opacity='0';
    flash.style.transform='translate(-50%,-50%) scale(1.15)';
    setTimeout(()=>flash.remove(), 300);
  }, 1800);
}

document.getElementById('startBtn').addEventListener('click', startGame);
requestAnimationFrame(loop);
</script>
